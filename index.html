<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>YukiBBS</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="header">
  YukiBBSを目指して作成中
</div>

<div id="input-area">

  <input id="name" placeholder="name">

  <input id="seed" placeholder="seed">

  <input id="message" placeholder="message">

  <button id="send">
    send
  </button>

</div>

<table id="messages">

  <thead>
    <tr>
      <th>No</th>
      <th>User</th>
      <th>Message</th>
    </tr>
  </thead>

  <tbody id="messages-body">
  </tbody>

</table>

<script src="app.js"></script>

</body>
</html>
