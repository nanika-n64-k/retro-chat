<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>YukiBBS</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="header">
  YukiBBS
</div>

<div id="input-area">

  <label>
    Name
    <input id="name" placeholder="name">
  </label>

  <label>
    Seed
    <input id="seed" placeholder="seed">
  </label>

  <label>
    Message
    <input id="message" placeholder="message">
  </label>

  <button id="send">
    send
  </button>

</div>

<table id="messages">

  <thead>
    <tr>
      <th class="col-no">No</th>

      <th class="col-user">
        Username
      </th>

      <th class="col-message">
        Comment
      </th>
    </tr>
  </thead>

  <tbody id="messages-body">
  </tbody>

</table>

<script src="app.js"></script>

</body>
</html>
